name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Toolchain Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: |
          set -euo pipefail

          for filter in \
            "RenderEngineTests" \
            "EventBusTests.AppReactionRulesTests" \
            "EventBusTests.CalendarMonitorTests" \
            "EventBusTests.ClipboardMonitorTests" \
            "EventBusTests.EventBusTests" \
            "EventBusTests.FSEventsMonitorTests" \
            "EventBusTests.GitHubMonitorTests" \
            "EventBusTests.KeyboardMonitorTests" \
            "EventBusTests.NotificationMonitorTests" \
            "EventBusTests.TimerSourceTests" \
            "EventBusTests.WebhookServerTests" \
            "EventBusTests.WorkspaceMonitorTests" \
            "PluginRuntimeTests" \
            "SecurityLayerTests" \
            "FocusMonitorTests" \
            "LocalizationTests" \
            "PersistenceTests" \
            "AIEngineTests" \
            "ChatUITests"
          do
            echo "::group::swift test ${filter}"
            swift test --filter "${filter}"
            echo "::endgroup::"
          done

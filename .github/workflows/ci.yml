name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Toolchain Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: |
          set -euo pipefail

          for target in \
            RenderEngineTests \
            EventBusTests \
            PluginRuntimeTests \
            SecurityLayerTests \
            FocusMonitorTests \
            LocalizationTests \
            PersistenceTests \
            AIEngineTests \
            ChatUITests
          do
            echo "::group::swift test ${target}"
            swift test --filter "^${target}\\."
            echo "::endgroup::"
          done

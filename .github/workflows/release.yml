name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || true

      - name: Build Release
        run: swift build -c release

      - name: Package
        run: |
          BUILD_DIR=".build/release"
          APP_NAME="VitaPetApp"
          VERSION="${{ github.ref_name }}"

          mkdir -p dist
          cp "$BUILD_DIR/$APP_NAME" dist/
          cp -r "$BUILD_DIR/VitaPet_Localization.bundle" dist/ 2>/dev/null || true
          cp -r "$BUILD_DIR/VitaPet_RenderEngine.bundle" dist/ 2>/dev/null || true
          cp LICENSE dist/
          cp README.md dist/

          cd dist
          zip -r "../VitaPet-${VERSION}-macos.zip" .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: VitaPet-${{ github.ref_name }}-macos.zip
